<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>UniGuide - Login</title><link rel="stylesheet" href="style.css"></head>
<body class="login-body"><div class="float-mark"></div>
  <form class="login-card" action="chatbot.html">
    <div class="login-top">
      <div class="logo-circle"><div class="fake-logo">JUST<br>CS</div></div>
      <h1>UniGuide</h1><p>Computer Science Students Advisor</p>
    </div>
    <div class="login-form">
      <div class="login-group"><label>Student ID</label><div class="login-input-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>
        <input class="login-input" type="text" placeholder="e.g. 112233" required>
      </div></div>
      <div class="login-group"><div class="login-row"><label>Password</label><a href="forgot-password.html">Forgot?</a></div><div class="login-input-box">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input class="login-input" type="password" placeholder="••••••••" required>
      </div></div>
      <button class="login-btn">↪ &nbsp; Let's Go!</button>
    </div>
  </form>
  <p class="copyright">© 2026 Jordan University of Science and Technology</p>
</body></html>
